<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Student Management</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        table { border-collapse: collapse; width: 70%; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        a { margin-right: 10px; text-decoration: none; color: #007bff; }
        .btn-add { display: inline-block; margin-bottom: 15px; padding: 8px 16px; background: #007bff; color: white; border-radius: 4px; }
    </style>
</head>
<body>
<h2>Student Management System</h2>
<a class="btn-add" th:href="@{/showNewForm}">Add New Student</a>

<table>
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Department</th>
        <th>Actions</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="student : ${listStudents}">
        <td th:text="${student.id}"></td>
        <td th:text="${student.name}"></td>
        <td th:text="${student.email}"></td>
        <td th:text="${student.department}"></td>
        <td>
            <a th:href="@{/showFormForUpdate/{id}(id=${student.id})}">Edit</a>
            <a th:href="@{/deleteStudent/{id}(id=${student.id})}"
               onclick="return confirm('Are you sure you want to delete this student?')">Delete</a>
        </td>
    </tr>
    </tbody>
</table>

<form th:action="@{/logout}" method="post" style="display:inline;">
    <button type="submit" style="background:#dc3545;color:white;border:none;padding:6px 12px;border-radius:4px;cursor:pointer;">Logout</button>
</form>
</body>
</html>
